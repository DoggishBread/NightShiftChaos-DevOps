apiVersion: apps/v1
kind: Deployment
metadata:
  name: nightshift-deployment
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nightshift
  template:
    metadata:
      annotations:
        rollme: {{ randAlphaNum 5 | quote }}
    spec:
      containers:
        - name: nightshift
          image: nightshift-app:latest
          imagePullPolicy: Never
      labels:
        app: nightshift
    spec:
      containers:
        - name: nightshift-container
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
            - containerPort: 8501